name: Question
description: Ask a question about OpenCode2
title: "[Question]: "
labels: ["question", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Question
        Your question about OpenCode2

  - type: textarea
    id: question
    attributes:
      label: Question
      placeholder: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      placeholder: Provide any additional context for your question...
